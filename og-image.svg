<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <symbol id="person" viewBox="0 0 11 12">
      <rect x="2.5" y="0.3" width="6" height="5.4" rx="1.6" fill="currentColor"/>
      <path d="M0,12 Q0,6.5 5.5,6.5 Q11,6.5 11,12Z" fill="currentColor"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Grey people — left side, fading into darkness at edge -->
